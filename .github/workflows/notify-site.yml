name: Trigger site rebuild

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  rebuild:
    runs-on: ubuntu-latest
    steps:
      - name: Notify deploy hook
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST "$HOOK")
          echo "Deploy hook returned HTTP $status"
          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            exit 1
          fi
        env:
          HOOK: ${{ secrets.DEPLOY_HOOK }}
